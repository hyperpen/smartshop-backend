<ion-header>
  <ion-toolbar color="primary">
    <ion-buttons slot="start">
      <ion-back-button defaultHref="/home"></ion-back-button>
    </ion-buttons>
    <ion-title>🛒 My Cart</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content>

  <ion-list *ngIf="cartItems.length > 0">
    <ion-item *ngFor="let c of cartItems" class="cart-item-list">
      <ion-thumbnail slot="start" *ngIf="c.img">
        <img [src]="c.img" [alt]="c.name" />
      </ion-thumbnail>

      <ion-label>
        <h2>{{ c.name }}</h2>
        <p>₱{{ c.price.toLocaleString() }} each</p>
      </ion-label>

      <div slot="end" class="quantity-controls">
        <ion-button
          fill="outline"
          size="small"
          shape="round"
          (click)="decreaseQuantity(c.id)">
          −
        </ion-button>
        <span class="qty-display">{{ c.quantity }}</span>
        <ion-button
          fill="outline"
          size="small"
          shape="round"
          (click)="increaseQuantity(c.id)">
          +
        </ion-button>
        <ion-button
          fill="clear"
          color="danger"
          size="small"
          (click)="removeFromCart(c.id)">
          🗑️
        </ion-button>
      </div>
    </ion-item>
  </ion-list>

  <div *ngIf="cartItems.length === 0" class="empty">
    <div class="empty-icon">🛍️</div>
    <p>Your cart is empty</p>
    <ion-button fill="outline" routerLink="/home">Continue Shopping</ion-button>
  </div>

  <div class="cart-summary" *ngIf="cartItems.length > 0">
    <div class="summary-row">
      <span>Subtotal:</span>
      <strong>₱{{ total.toLocaleString() }}</strong>
    </div>
    <div class="summary-row">
      <span>Shipping:</span>
      <strong>FREE (₱2000+)</strong>
    </div>
    <div class="summary-row total">
      <span>Total:</span>
      <strong>₱{{ total.toLocaleString() }}</strong>
    </div>
  </div>

  <ion-button expand="block" color="primary" size="large" (click)="openCheckoutModal()" *ngIf="cartItems.length > 0">
    💳 CHECKOUT
  </ion-button>

</ion-content>
